<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>แบบประเมินการผูกยึดผู้ป่วย</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f7fa;
}

.card{
    border:none;
    border-radius:16px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.result-box{
    display:none;
}

.level-yellow{
    background:#fff3cd;
    border-left:5px solid #ffc107;
}

.level-orange{
    background:#ffe5d0;
    border-left:5px solid #fd7e14;
}

.level-red{
    background:#f8d7da;
    border-left:5px solid #dc3545;
}

.level-green{
    background:#d1e7dd;
    border-left:5px solid #198754;
}

@media (max-width:768px){

    h2{
        font-size:1.3rem;
    }

    .btn{
        width:100%;
    }

}
</style>

</head>

<body>

<div class="container py-4">


<div class="row justify-content-center">

    <div class="col-lg-8 col-md-10">

        <div class="card p-4">

            <h2 class="text-center mb-4">
                แบบประเมินการผูกยึดผู้ป่วย
            </h2>

            <div class="mb-3">
                <label class="form-label">
                    HN ผู้ป่วย
                </label>
                <input type="text" class="form-control" id="hn">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    ชื่อผู้ป่วย
                </label>
                <input type="text" class="form-control" id="patientName">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    ผล CAM-ICU
                </label>

                <select id="cam" class="form-select">
                    <option value="negative">
                        Negative (No Delirium)
                    </option>
                    <option value="positive">
                        Positive (Delirium)
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    คะแนน RASS
                </label>

                 <select id="rass" class="form-select">
        <option value="-5">-5 ไม่ตอบสนองต่อเสียงหรือการกระตุ้นทางกาย</option>
        <option value="-4">-4 ไม่ตอบสนองต่อเสียงแต่มีการเคลื่อนไหว
หรือลืมตาเมื่อเจ็บ</option>
        <option value="-3">-3 ปลุกตื่นด้วยเสียงเรียก</option>
        <option value="-2">-2 ปลุกตื่นด้วยเสียงเรียก</option>
        <option value="-1">-1 ปลุกตื่นด้วยเสียงเรียก</option>
        <option value="0">0 ตื่นตัว สงบ</option>
        <option value="1">+1 กระสับกระส่าย วิตกกังวล มีการเคลื่อนไหว
    ที่ไม่ก้าวร้าวรุนแรง</option>
        <option value="2">+2 มีการเคลื่อนไหวอย่างไม่มีเป้าหมายบ่อยครั้ง 
  ต้านเครื่องหายใจ</option>
        <option value="3">+3 ดึงท่อ หรือสายต่างๆ ต่อสู้ มีความรุนแรง
เป็นอันตราย ต่อบุคลากรทันทีทันใด</option>
        <option value="4">+4 ดึงท่อ หรือสายต่างๆ ต่อสู้ มีความรุนแรง
เป็นอันตราย ต่อบุคลากรทันทีทันใด</option>
    </select>
            </div>

            <button class="btn btn-primary" onclick="evaluatePatient()">
                ประเมินผล
            </button>

            <div id="resultBox"
                 class="result-box mt-4 p-3 rounded">
            </div>

        </div>

    </div>

</div>


</div>

<script>

function evaluatePatient(){

    const cam =
    document.getElementById('cam').value;

    const rass =
    parseInt(document.getElementById('rass').value);

    let resultBox =
    document.getElementById('resultBox');

    let html = "";
    let cssClass = "";

    if(cam === "negative"){

        cssClass = "level-green";

        html = `
            <h5>ไม่ต้องผูกยึด</h5>
            <p>ไม่พบ Delirium</p>
            <p>ประเมิน CAM-ICU และ RASS ซ้ำทุก 4 ชั่วโมง</p>
        `;
    }
    else{

        if(rass <= 0){

            cssClass = "level-green";

            html = `
            <h5>Hypoactive Delirium</h5>
            <p>ไม่ต้องผูกยึด</p>
            `;

        }else if(rass == 1){

            cssClass = "level-yellow";

            html = `
            <h5>Restless (Yellow)</h5>
            <p>ใช้ Mittens Only</p>
            `;

        }else if(rass == 2){

            cssClass = "level-orange";

            html = `
            <h5>Agitated (Orange)</h5>
            <p>ใช้ Mittens + Wrist Restraint</p>
            `;

        }else{

            cssClass = "level-red";

            html = `
            <h5>Danger (Red)</h5>
            <p>ใช้ Mittens + Wrist Restraint + Chest Strap</p>
            `;
        }
    }

    resultBox.className =
    "result-box mt-4 p-3 rounded " + cssClass;

    resultBox.style.display = "block";

    resultBox.innerHTML = html;
}

</script>

</body>
</html>
